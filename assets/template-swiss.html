<!doctype html>
<html lang="zh-CN" data-accent="slate">
<head>
  <meta charset="utf-8">
  <title>[TITLE] — 小红书配图</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    /* === ACCENT PALETTES (set via data-accent on <html>) === */
    :root,[data-accent="slate"] {
      --paper: #fafaf8; --ink: #0a0a0a;
      --grey-1: #f0f0ee; --grey-2: #d4d4d2; --grey-3: #737373;
      --accent: #2c898a; --accent-on: #ffffff;
    }
    [data-accent="crimson"] {
      --paper: #fafaf8; --ink: #0a0a0a;
      --grey-1: #f0f0ee; --grey-2: #d4d4d2; --grey-3: #737373;
      --accent: #c0392b; --accent-on: #ffffff;
    }
    [data-accent="ikb"] {
      --paper: #fafaf8; --ink: #0a0a0a;
      --grey-1: #f0f0ee; --grey-2: #d4d4d2; --grey-3: #737373;
      --accent: #002FA7; --accent-on: #ffffff;
    }
    [data-accent="lemon-green"] {
      --paper: #fafaf8; --ink: #0a0a0a;
      --grey-1: #f0f0ee; --grey-2: #d4d4d2; --grey-3: #737373;
      --accent: #C5E803; --accent-on: #0a0a0a;
    }
    [data-accent="safety-orange"] {
      --paper: #fafaf8; --ink: #0a0a0a;
      --grey-1: #f0f0ee; --grey-2: #d4d4d2; --grey-3: #737373;
      --accent: #FF6B35; --accent-on: #ffffff;
    }
    [data-accent="wisteria"] {
      --paper: #fafaf8; --ink: #0a0a0a;
      --grey-1: #f0f0ee; --grey-2: #d4d4d2; --grey-3: #737373;
      --accent: #7d5ba6; --accent-on: #ffffff;
    }

    /* === TYPOGRAPHY (system fonts — works offline, always renders) === */
    :root {
      --sans: "Microsoft YaHei","PingFang SC","Noto Sans SC","Helvetica Neue",Helvetica,sans-serif;
      --sans-zh: "Microsoft YaHei","PingFang SC","Noto Sans SC",sans-serif;
      --mono: Consolas,"SF Mono","IBM Plex Mono",ui-monospace,monospace;
      --sp-3:8px; --sp-4:12px; --sp-5:16px; --sp-6:24px;
      --sp-7:32px; --sp-8:40px; --sp-9:48px; --sp-10:64px;
      --sp-11:80px; --sp-12:96px;
    }

    /* === RESET === */
    *,*::before,*::after{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{background:#1a1a1a;font-family:var(--sans);color:var(--ink);-webkit-font-smoothing:antialiased;padding:64px 32px}
    .sheet{display:flex;flex-direction:column;align-items:center;gap:48px}

    /* === POSTER BOARD (3:4 fixed) === */
    .poster{position:relative;background:var(--paper);color:var(--ink);overflow:hidden;isolation:isolate}
    .poster.xhs{width:1080px;height:1440px}
    .poster figure{margin:0}
    .poster.xhs .content{padding:var(--sp-12) var(--sp-11)}
    .content{position:relative;width:100%;height:100%;z-index:2}

    /* === DECORATIVE LAYERS (opt-in per poster) === */
    .dot-mat{position:absolute;inset:0;pointer-events:none;z-index:1;opacity:.06;
      background-image:radial-gradient(var(--ink) 1.5px,transparent 1.5px);background-size:24px 24px}
    .cross-mat{position:absolute;inset:0;pointer-events:none;z-index:1;opacity:.05;
      background-image:linear-gradient(var(--ink),var(--ink)),linear-gradient(90deg,var(--ink),var(--ink));
      background-size:1px 14px,14px 1px;background-position:center;background-repeat:repeat}

    /* === TYPOGRAPHY SCALE (the larger, the lighter) === */
    .h-statement{font-family:var(--sans);font-weight:200;font-size:112px;line-height:1.08;letter-spacing:-.01em;margin:0}
    .h-xl{font-family:var(--sans);font-weight:300;font-size:88px;line-height:1.1;letter-spacing:-.01em;margin:0}
    .h-md{font-family:var(--sans);font-weight:400;font-size:52px;line-height:1.18;margin:0}
    .lead{font-family:var(--sans-zh);font-weight:400;font-size:28px;line-height:1.5;margin:0}
    .body{font-family:var(--sans-zh);font-weight:400;font-size:26px;line-height:1.6;margin:0}
    .t-cat{font-family:var(--sans);font-weight:600;font-size:22px;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);margin:0}
    .t-meta{font-family:var(--mono);font-weight:500;font-size:20px;letter-spacing:.14em;text-transform:uppercase;color:var(--grey-3);margin:0}
    .num-mega{font-family:var(--sans);font-weight:200;font-size:168px;line-height:.92;letter-spacing:-.03em;margin:0}

    /* === LAYOUT PRIMITIVES === */
    .stack{display:flex;flex-direction:column}
    .row{display:flex;flex-direction:row}
    .gap-4{gap:var(--sp-4)}.gap-5{gap:var(--sp-5)}.gap-6{gap:var(--sp-6)}.gap-7{gap:var(--sp-7)}.gap-8{gap:var(--sp-8)}.gap-9{gap:var(--sp-9)}
    .grow{flex:1}
    .hr-hairline{height:1px;background:var(--grey-2);border:0;margin:0}
    .hr-accent{height:3px;background:var(--accent);border:0;width:96px;margin:0}

    /* === CARD FILLS (mutually exclusive) === */
    .card-fill{background:var(--grey-1);color:var(--ink);padding:var(--sp-6)}
    .card-accent{background:var(--accent);color:var(--accent-on);padding:var(--sp-6)}
    .card-accent .t-cat,.card-accent .body,.card-accent .lead{color:var(--accent-on)}
    .card-outlined{background:transparent;border:1px solid var(--grey-2);padding:var(--sp-6)}

    /* === CHROME MIN (top metadata strip) === */
    .chrome-min{display:flex;justify-content:space-between;align-items:center;
      font-family:var(--mono);font-size:18px;letter-spacing:.14em;
      text-transform:uppercase;color:var(--grey-3);
      padding-bottom:var(--sp-6);border-bottom:1px solid var(--grey-2);margin-bottom:var(--sp-9)}

    /* === STACKED LEDGER (S11) === */
    .stacked-ledger{display:flex;flex-direction:column}
    .stacked-ledger .ledger-row{display:grid;grid-template-columns:280px 1fr auto;gap:var(--sp-7);align-items:baseline;padding:var(--sp-7) 0;border-bottom:1px solid var(--grey-2)}
    .stacked-ledger .ledger-row:first-child{padding-top:0}
    .stacked-ledger .ledger-row:last-child{border-bottom:0}
    .stacked-ledger .ledger-num{font-family:var(--sans);font-weight:200;font-size:112px;line-height:1;letter-spacing:-.02em;margin:0}
    .stacked-ledger .ledger-lbl{font-family:var(--sans-zh);font-weight:500;font-size:30px;line-height:1.3;color:var(--ink)}
    .stacked-ledger .ledger-lbl .sub{display:block;font-weight:400;font-size:22px;color:var(--grey-3);margin-top:var(--sp-3)}
    .stacked-ledger .ledger-icn{width:56px;height:56px;color:var(--accent)}

    /* === MATRIX FILL (S12) === */
    .matrix-fill{display:grid;grid-template-columns:repeat(2,1fr);grid-auto-rows:min-content;gap:var(--sp-4)}
    .matrix-fill .matrix-cell{background:var(--grey-1);padding:var(--sp-5);display:flex;flex-direction:column;gap:var(--sp-4);min-height:0}
    .matrix-fill .matrix-cell .cell-nb{font-family:var(--mono);font-size:18px;letter-spacing:.12em;color:var(--grey-3)}
    .matrix-fill .matrix-cell .cell-title{font-family:var(--sans-zh);font-weight:500;font-size:24px;line-height:1.3;color:var(--ink)}
    .matrix-fill .matrix-cell.is-accent{background:var(--accent)}
    .matrix-fill .matrix-cell.is-accent .cell-nb,.matrix-fill .matrix-cell.is-accent .cell-title{color:var(--accent-on)}
    .hero-stat-bottom{margin-top:var(--sp-6);padding-top:var(--sp-5);border-top:1px solid var(--grey-2);display:grid;grid-template-columns:1fr auto;align-items:center;gap:var(--sp-7)}
    .hero-stat-bottom .num-mega{font-size:128px;line-height:1}

    /* === TWO SIGNALS (S02) === */
    .two-signals{display:grid;grid-template-columns:1fr 1fr;gap:var(--sp-7)}
    .signal-block{padding:var(--sp-7);display:flex;flex-direction:column;gap:var(--sp-5)}
    .signal-block.solid{background:var(--ink);color:var(--paper)}
    .signal-block.solid .t-cat,.signal-block.solid .body,.signal-block.solid .h-md{color:var(--paper)}
    .signal-block.outlined{border:1px solid var(--grey-2)}

    /* === H-BAR CHART (S10) === */
    .h-bar-chart{display:grid;gap:var(--sp-6)}
    .h-bar-chart .bar-row{display:grid;grid-template-columns:1fr;gap:var(--sp-4)}
    .h-bar-chart .bar-row .row-lbl{font-family:var(--sans-zh);font-weight:500;font-size:26px;color:var(--ink)}
    .h-bar-chart .bar-row .row-track{position:relative;height:28px;background:var(--grey-1)}
    .h-bar-chart .bar-row .row-fill{position:absolute;left:0;top:0;bottom:0;width:var(--w,50%);background:var(--accent)}
    .h-bar-chart .bar-row .row-val{font-family:var(--mono);font-weight:500;font-size:26px;letter-spacing:.04em;color:var(--ink)}

    /* === FRAME SHOT (screenshots) === */
    .frame-shot{position:relative;overflow:hidden;display:block;margin:0;background:var(--grey-1)}
    .frame-shot img{width:100%;height:100%;object-fit:contain;object-position:center;display:block}
    .frame-shot.bg-grey-1{background:var(--grey-1)}

    /* === SCENARIO GRID (custom) === */
    .scenario-grid{display:grid;grid-template-columns:1fr 1fr;gap:var(--sp-5)}
    .scenario-card{padding:var(--sp-5);background:var(--grey-1);display:flex;flex-direction:column;gap:var(--sp-3)}
    .scenario-card .sc-num{font-family:var(--mono);font-size:16px;color:var(--accent);letter-spacing:.1em}
    .scenario-card .sc-title{font-family:var(--sans-zh);font-weight:600;font-size:26px;color:var(--ink)}
    .scenario-card .sc-body{font-family:var(--sans-zh);font-size:22px;line-height:1.45;color:var(--grey-3)}

    /* === TAG GRID === */
    .tag-grid{display:grid;grid-template-columns:1fr 1fr;gap:var(--sp-5)}
    .tag-item{display:flex;align-items:center;gap:var(--sp-4);padding:var(--sp-5);background:var(--grey-1)}
    .tag-num{font-family:var(--mono);font-size:18px;color:var(--accent);min-width:28px}
    .tag-name{font-family:var(--sans-zh);font-weight:500;font-size:28px;color:var(--ink)}
  </style>
</head>
<body>
  <main class="sheet">

    <!-- POSTERS_HERE -->
    <!--
      Replace with real content. Each <section> is one 3:4 poster.
      See references/layout-recipes.md for available patterns.

      Available accent presets (set on <html data-accent="...">):
        slate | crimson | ikb | lemon-green | safety-orange | wisteria
    -->

    <!-- Example: S01 Accent Cover -->
    <section class="poster xhs" id="xhs-01">
      <div class="dot-mat"></div>
      <div class="content stack gap-9">
        <div class="chrome-min">
          <span>[CATEGORY]</span>
          <span>2026.06</span>
        </div>
        <div class="stack gap-7">
          <p class="t-cat">[KICKER]</p>
          <h1 class="h-statement">[TITLE<br>LINE2]</h1>
        </div>
        <div class="grow"></div>
        <hr class="hr-accent">
        <p class="lead">[SUBTITLE_LINE1]<br>[SUBTITLE_LINE2]</p>
        <div class="row gap-6">
          <p class="t-meta">[META_1]</p>
          <p class="t-meta">/ [META_2]</p>
        </div>
      </div>
    </section>

  </main>
</body>
</html>
